<div class="manager-page">

    <!-- LEFT SIDE -->

    <div class="left-panel">

        <div class="welcome-content">

            <h2>👨‍💼 Welcome Manager</h2>

            <p>
                Welcome to <strong>Mess Nova</strong>.<br><br>
                Complete your profile to manage the mess
                system efficiently.
            </p>

            <div class="features">

                <p>✔ Secure Management</p>

                <p>✔ Staff Verification</p>

                <p>✔ Easy Shift Handling</p>

                <p>✔ Fast Operations</p>

            </div>

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right-panel">

        <div class="manager-container">

            <h2>👤 Manager Details</h2>

            <form>

                <!-- Profile Picture -->

                <div class="form-group">

                    <label>Profile Picture</label>

                    <input
                        type="file">

                </div>

                <!-- Full Name -->

                <div class="form-group">

                    <label>Full Name</label>

                    <input
                        type="text"
                        placeholder="Enter Full Name">

                </div>

                <!-- Employee ID -->

                <div class="form-group">

                    <label>Employee ID</label>

                    <input
                        type="text"
                        placeholder="Enter Employee ID">

                </div>

                <!-- Experience -->

                <div class="form-group">

                    <label>Experience</label>

                    <input
                        type="number"
                        placeholder="Years of Experience"
                        min="0"
                        max="10">

                </div>

                <!-- Shift -->

                <div class="form-group">

                    <label>Shift</label>

                    <select>

                        <option>Select Shift</option>

                        <option>Morning</option>

                        <option>Afternoon</option>

                        <option>Night</option>

                    </select>

                </div>

                <!-- Upload ID -->

                <div class="form-group">

                    <label>Upload ID</label>

                    <input
                        type="file">

                </div>

                <!-- Button -->

                <button type="submit">

                    Save Details

                </button>

            </form>

        </div>

    </div>

</div>
