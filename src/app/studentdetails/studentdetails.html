<div class="profile-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <div class="overlay">

            <h1>Complete Your Profile</h1>

            <p>
                Fill in your details to continue to your dashboard.
            </p>

        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- THIS WRAPPER ADDED -->
        <div class="form-container">

            <h2>Student Profile</h2>

            <form>

                <div class="form-group">
                    <label>Profile Picture</label>
                    <input type="file" accept="image/*">
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label>Register Number</label>
                    <input type="text" placeholder="Enter Register Number">
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <select>
                        <option selected disabled>Select Department</option>
                        <option>Information Technology (IT)</option>
                        <option>Computer Science and Engineering (CSE)</option>
                        <option>Artificial Intelligence & Data Science (AIDS)</option>
                        <option>Artificial Intelligence & Machine Learning (AIML)</option>
                        <option>Computer Science and Business Systems (CSBS)</option>
                        <option>Electronics and Communication Engineering (ECE)</option>
                        <option>Electrical and Electronics Engineering (EEE)</option>
                        <option>Electronics and Instrumentation Engineering (EIE)</option>
                        <option>Mechanical Engineering (MECH)</option>
                        <option>Civil Engineering (CIVIL)</option>
                        <option>Biomedical Engineering (BME)</option>
                        <option>Agricultural Engineering (AGRI)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Year</label>
                    <select>
                        <option selected disabled>Select Year</option>
                        <option>I Year</option>
                        <option>II Year</option>
                        <option>III Year</option>
                        <option>IV Year</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Section</label>
                    <select>
                        <option selected disabled>Select Section</option>
                        <option>A</option>
                        <option>B</option>
                        <option>C</option>
                        <option>D</option>
                    </select>
                </div>

                <button type="submit">Save & Continue</button>

            </form>

        </div>

    </div>

</div>
