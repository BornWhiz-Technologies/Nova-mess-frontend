<div class="manager-page">
  <!-- LEFT SIDE -->
  <div class="left-panel">
    <div class="welcome-content">
      <h2>👨‍💼 Welcome Manager</h2>
      <p>
        Welcome to <strong>Mess Nova</strong>.<br /><br />
        Complete your profile to manage the mess system efficiently.
      </p>

      <div class="features">
        <p>✔ Secure Management</p>
        <p>✔ Staff Verification</p>
        <p>✔ Easy Shift Handling</p>
        <p>✔ Fast Operations</p>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE -->

  <div class="right-panel">
    <div class="manager-container">
      <h2>👤 Manager Details</h2>
      <form (ngSubmit)="saveManager()">
        <!-- Profile Picture -->
        <div class="form-group">
          <label>Profile Picture</label>

          <input type="file" accept="image/*" (change)="onProfilePictureChange($event)" />
        </div>

        <!-- Full Name -->
        <div class="form-group">
          <label>Full Name</label>

          <input
            type="text"
            name="fullName"
            [(ngModel)]="managerData.fullName"
            placeholder="Enter Full Name"
            required
          />
        </div>

        <!-- Employee ID -->
        <div class="form-group">
          <label>Employee ID</label>

          <input
            type="text"
            name="employeeId"
            [(ngModel)]="managerData.employeeId"
            placeholder="Enter Employee ID"
            required
          />
        </div>

        <!-- Experience -->
        <div class="form-group">
          <label>Experience</label>

          <input
            type="number"
            name="experience"
            [(ngModel)]="managerData.experience"
            placeholder="Years of Experience"
            min="0"
            max="99"
            required
            (input)="limitExperience($event)"
          />
        </div>

        <!-- Shift -->
        <div class="form-group">
          <label>Shift</label>

          <select name="shift" [(ngModel)]="managerData.shift" required>
            <option value="">Select Shift</option>
            <option value="Morning">Morning</option>
            <option value="Afternoon">Afternoon</option>
            <option value="Night">Night</option>
          </select>
        </div>

        <!-- Upload Employee ID Proof -->
        <div class="form-group">
          <label>Upload ID</label>

          <input
            type="file"
            accept=".jpg,.jpeg,.png,.pdf"
            (change)="onEmployeeIdProofChange($event)"
          />
        </div>

        <!-- Submit Button -->
        <button type="submit">Save Details</button>
      </form>
    </div>
  </div>
</div>
