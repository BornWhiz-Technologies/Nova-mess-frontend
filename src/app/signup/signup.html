<div class="signup-container">

    <!-- LEFT SIDE FORM -->

    <div class="left-panel">

        <div class="form-box">

            <h2>Create Account</h2>

            <p>Welcome to MESS NOVA. Create your account to continue.</p>

<form>

    <!-- Username -->

    <div class="input-group">
        <label for="username">Username</label>

        <div class="input-field">
            <input
                type="text"
                id="username"
                placeholder="Enter Username">
        </div>
    </div>

    <!-- Email -->

    <div class="input-group">
        <label for="email">Email Address</label>

        <div class="input-field">
            <input
                type="email"
                id="email"
                placeholder="example@gmail.com"
                (input)="validateEmail($event)">

            <small class="error" *ngIf="emailError">
                {{ emailError }}
            </small>
        </div>
    </div>

    <!-- Mobile -->

    <div class="input-group">
        <label for="mobile">Mobile Number</label>

        <div class="input-field">
            <input
                type="tel"
                id="mobile"
                placeholder="Enter your mobile number"
                maxlength="10"
                (input)="validateMobile($event)">

            <small class="error" *ngIf="mobileError">
                {{ mobileError }}
            </small>
        </div>
    </div>

    <!-- Password -->

    <div class="input-group">
        <label for="password">Password</label>

        <div class="input-field">
            <input
                type="password"
                id="password"
                placeholder="Enter Password">
        </div>
    </div>

    <!-- Confirm Password -->

    <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>

        <div class="input-field">
            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password">
        </div>
    </div>

    <!-- Role -->

    <p class="role-title">Select Role</p>

    <div class="role-box">

        <label>
            <input
                type="radio"
                name="role"
                value="student">
            Student
        </label>

        <label>
            <input
                type="radio"
                name="role"
                value="manager">
            Manager
        </label>

    </div>

    <!-- Signup Button -->

    <button
        type="submit"
        class="signup-btn">

        Sign Up

    </button>

    <!-- Divider -->

    <div class="divider">
        <span>OR</span>
    </div>

    <!-- Google -->

    <button
        type="button"
        class="google-btn">

        Continue with Google

    </button>

    <!-- Login -->

    <div class="login-link">

        Already have an account?

        <a routerLink="/login">

            Login

        </a>

    </div>

</form>

        </div>

    </div>

    <!-- RIGHT SIDE IMAGE -->

    <div class="right-panel">

        <div class="image-content">

            <h1>MESS NOVA</h1>

            <p>

                Smart Mess Management System

                <br>

                for Students, Managers

                <br>

                and Administrators.

            </p>

        </div>

    </div>

</div>
